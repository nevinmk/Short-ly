# Backend group pointing at the "api" Docker Compose service on its internal port.
upstream api {
    server api:3000;
}

server {
    # Public-facing port the container exposes.
    listen 80;

    location / {
        # Forward all requests to the API upstream.
        proxy_pass http://api;
        # Preserve the original Host header so the app sees the real request host.
        proxy_set_header Host $host;
        # Pass along the client's real IP (otherwise the API only sees nginx's IP).
        proxy_set_header X-Real-IP $remote_addr;
    }
}